apiVersion: batch/v1
kind: Job
metadata:
  name: vn-minio-bucket-bootstrap
  namespace: vn-storage
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: vn-minio-root
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vn-minio-root
                  key: rootPassword
          command:
            - sh
            - -c
            - |
              set -e
              echo "Waiting for MinIO to be reachable..."
              until mc alias set local http://vn-minio.vn-storage.svc.cluster.local:9000 \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null; do
                echo "  not ready, retrying in 2s..."
                sleep 2
              done
              echo "Connected. Ensuring buckets exist (idempotent)..."
              mc mb --ignore-existing local/vn-characters
              mc mb --ignore-existing local/vn-uploads
              echo "Done. Listing buckets:"
              mc ls local
